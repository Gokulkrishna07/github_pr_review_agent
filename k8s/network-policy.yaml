apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: review-agent-netpol
  namespace: ai-reviewer
spec:
  podSelector:
    matchLabels:
      app: review-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
  egress:
    - {}  # allow all egress (GitHub API, Groq API)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-netpol
  namespace: ai-reviewer
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: grafana
        - podSelector:
            matchLabels:
              app: review-agent
      ports:
        - port: 9090
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-netpol
  namespace: ai-reviewer
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 3000
  egress:
    - {}
