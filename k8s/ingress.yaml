apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: review-agent-ingress
  namespace: ai-reviewer
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: review-agent
                port:
                  number: 80
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: review-agent
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: review-agent
                port:
                  number: 80
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: review-dashboard
                port:
                  number: 8504
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
