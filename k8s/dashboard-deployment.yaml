apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-dashboard
  namespace: ai-reviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-dashboard
  template:
    metadata:
      labels:
        app: review-dashboard
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "CriticalAddonsOnly"
          operator: "Exists"
      containers:
        - name: dashboard
          image: review-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8504
          env:
            - name: API_BASE_URL
              value: "http://review-agent.ai-reviewer.svc.cluster.local"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /dashboard/_stcore/health
              port: 8504
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /dashboard/_stcore/health
              port: 8504
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: review-dashboard
  namespace: ai-reviewer
spec:
  type: NodePort
  selector:
    app: review-dashboard
  ports:
    - name: dashboard
      port: 8504
      targetPort: 8504
      nodePort: 30504
