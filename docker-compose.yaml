services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8504:8504"
    environment:
      - API_BASE_URL=http://agent:8000
    depends_on:
      - agent
