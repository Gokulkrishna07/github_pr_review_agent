name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          key: ${{ secrets.VM_SSH_KEY }}
          username: ${{ secrets.VM_SSH_USER }}
          port: ${{ secrets.VM_SSH_PORT }}
          script: |
            set -e

            # Clone if first deploy, otherwise pull
            if [ ! -d ~/Code_review_agent ]; then
              git clone https://github.com/Gokulkrishna07/github_pr_review_agent.git ~/Code_review_agent
            fi
            cd ~/Code_review_agent
            git pull origin main

            # Build agent image
            docker build -t review-agent:latest ./agent

            # Import into k3s containerd
            docker save review-agent:latest | sudo k3s ctr images import -

            # Apply k8s manifests (excluding secret)
            sudo kubectl apply -f k8s/namespace.yaml
            sudo kubectl apply -f k8s/ollama-pv.yaml
            sudo kubectl apply -f k8s/ollama-deployment.yaml

            # Wait for Ollama to be ready before deploying agent
            sudo kubectl rollout status deployment/ollama -n ai-reviewer --timeout=300s

            # Pull model into Ollama (idempotent - skips if already present)
            OLLAMA_POD=$(sudo kubectl get pod -n ai-reviewer -l app=ollama -o jsonpath='{.items[0].metadata.name}')
            sudo kubectl exec -n ai-reviewer "$OLLAMA_POD" -- ollama pull qwen2.5-coder:7b

            # Deploy agent
            sudo kubectl apply -f k8s/agent-configmap.yaml
            sudo kubectl apply -f k8s/agent-deployment.yaml
            sudo kubectl apply -f k8s/ingress.yaml

            # Restart agent to pick up new image
            sudo kubectl rollout restart deployment/review-agent -n ai-reviewer
            sudo kubectl rollout status deployment/review-agent -n ai-reviewer --timeout=120s
